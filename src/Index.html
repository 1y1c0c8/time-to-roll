<!DOCTYPE html><html lang="zh-Hant"><head>
<base target="_top">
<meta charset="utf-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Time to Roll">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f3ef; --card:#ffffff; --ink:#1c1b18; --muted:#8a877f;
  --line:#e7e5de; --accent:#0f766e; --accent-soft:#e3efed;
  --pos:#2f7d4f; --neg:#c0492f; --alt:#6b6f76; --warm:#b06a1f; --warm-bg:#fbf6ee;
  --shadow:0 1px 2px rgba(28,27,24,.05),0 6px 20px rgba(28,27,24,.06);
  --r:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--ink);
  font-family:"Noto Sans TC","Manrope",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{padding:0 0 120px;max-width:560px;margin:0 auto}
.num{font-family:"Manrope",sans-serif;font-variant-numeric:tabular-nums}

header{position:sticky;top:0;z-index:20;background:rgba(244,243,239,.86);
  backdrop-filter:saturate(150%) blur(10px);
  padding:max(14px,env(safe-area-inset-top)) 18px 6px;
  display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{font-family:"Manrope";font-weight:800;font-size:20px;letter-spacing:-.01em}
.brand small{font-weight:600;font-size:12px;color:var(--muted);margin-left:6px}
.wrap{padding:6px 16px}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}

.tabbar{display:flex;gap:6px;margin:2px 16px 8px}
.tabbar button{flex:1;border:0;background:transparent;color:var(--muted);font-weight:700;font-size:14px;
  padding:8px 4px;border-radius:10px;cursor:pointer;font-family:"Noto Sans TC"}
.tabbar button.active{background:var(--accent-soft);color:var(--accent)}
.tabbar i{display:block;font-size:16px;margin-bottom:2px}

.hero{padding:20px 16px 18px;text-align:center;margin-bottom:14px}
.hero .k{font-size:12px;color:var(--muted);margin-bottom:4px}
.hero .n{font-family:"Manrope";font-weight:800;font-size:42px;color:var(--accent);line-height:1}
.hero .n span{font-size:15px;color:var(--muted);font-weight:600}
.hero .last{font-size:12px;color:var(--muted);margin-top:6px}

.sect-title{font-size:12px;color:var(--muted);font-weight:700;margin:16px 4px 8px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:999px;
  padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.add{background:var(--accent-soft);color:var(--accent);border-color:transparent}
.chip .tag{font-size:10px;opacity:.7;margin-left:5px;font-weight:600}

.row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-top:1px solid var(--line)}
.row:first-child{border-top:0}
.row.tap{cursor:pointer} .row.tap:active{background:var(--accent-soft)}
.row .mid{flex:1;min-width:0}
.row .t1{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .t2{font-size:12px;color:var(--muted);margin-top:1px}
.row .rt{font-size:14px;color:var(--muted)}
.row .x{border:0;background:transparent;color:var(--neg);font-size:20px;cursor:pointer;padding:4px 6px}
.empty{padding:28px 16px;text-align:center;color:var(--muted);font-size:14px;line-height:1.6}
.hide{display:none!important}

.save{position:fixed;left:0;right:0;bottom:0;z-index:30;max-width:560px;margin:0 auto;
  padding:12px 16px max(14px,env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--bg) 28%)}
.save button{width:100%;border:0;border-radius:14px;padding:16px;font-size:17px;font-weight:700;
  font-family:"Noto Sans TC";color:#fff;background:var(--accent);box-shadow:var(--shadow);cursor:pointer}
.save button:active{transform:scale(.99)} .save button:disabled{opacity:.45}

.add-row{display:flex;gap:8px;padding:12px 14px}
.add-row input{flex:1;border:1px solid var(--line);background:var(--bg);border-radius:12px;
  padding:11px 12px;font-size:15px;font-family:inherit;outline:none}
.add-row button{border:0;background:var(--accent);color:#fff;border-radius:12px;padding:0 16px;
  font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
.mini{border:0;background:var(--accent-soft);color:var(--accent);border-radius:999px;
  padding:6px 12px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}
.mini.ghost{background:transparent;color:var(--muted)}

/* bottom-sheet overlay */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(28,27,24,.42);display:flex;align-items:flex-end;
  justify-content:center;opacity:0;pointer-events:none;transition:.2s}
.overlay.show{opacity:1;pointer-events:auto}
.sheet{background:var(--card);width:100%;max-width:560px;max-height:92vh;overflow:auto;border-radius:20px 20px 0 0;
  padding:8px 16px max(16px,env(safe-area-inset-bottom));transform:translateY(24px);transition:.2s}
.overlay.show .sheet{transform:translateY(0)}
.grip{width:38px;height:4px;border-radius:2px;background:var(--line);margin:8px auto 12px}
.sheet-title{font-family:"Manrope";font-weight:800;font-size:17px;text-align:center;margin:2px 0 14px}
.sheet-btn{width:100%;border:0;border-radius:13px;padding:15px;font-size:16px;font-weight:700;
  font-family:"Noto Sans TC";margin-top:8px;cursor:pointer}
.sheet-btn.primary{background:var(--accent);color:#fff}
.sheet-btn.del{background:var(--neg);color:#fff}
.sheet-btn.cancel{background:transparent;color:var(--muted)}
.field{padding:12px 2px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}
.field label{font-size:14px;color:var(--muted);font-weight:600;white-space:nowrap}
.field select,.field input{flex:1;border:0;background:transparent;text-align:right;font-size:16px;
  color:var(--ink);font-family:inherit;outline:none;-webkit-appearance:none;font-weight:600}

.toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);background:var(--ink);
  color:#fff;padding:11px 20px;border-radius:999px;font-size:14px;font-weight:600;opacity:0;transition:.25s;
  z-index:70;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <div class="brand">Time to Roll <small>抽菸紀錄</small></div>
  <div id="hdrDate" class="num" style="font-size:12px;color:var(--muted)"></div>
</header>

<div class="tabbar">
  <button data-v="log" class="active" onclick="showTab('log')"><i class="ti ti-plus"></i>記錄</button>
  <button data-v="stat" onclick="showTab('stat')"><i class="ti ti-chart-bar"></i>統計</button>
  <button data-v="inv" onclick="showTab('inv')"><i class="ti ti-box"></i>庫存</button>
  <button data-v="set" onclick="showTab('set')"><i class="ti ti-settings"></i>設定</button>
</div>

<!-- ===== 記錄 ===== -->
<section id="viewlog">
  <div class="wrap">
    <div class="card hero">
      <div class="k">今天已抽</div>
      <div class="n"><span id="todayN" class="num">0</span> <span>支</span></div>
      <div id="lastAgo" class="last"></div>
    </div>

    <div id="pickArea">
      <div class="sect-title">菸品</div>
      <div id="prodChips" class="chips"></div>
      <div id="pouchPickWrap" class="hide">
        <div class="sect-title">使用中的菸草包</div>
        <div id="pouchPick" class="chips"></div>
      </div>
      <div class="sect-title">原因</div>
      <div id="reasonChips" class="chips"></div>
    </div>

    <div class="sect-title">今天的紀錄</div>
    <div id="todayList" class="card"></div>
  </div>
</section>

<!-- ===== 統計 (P3) ===== -->
<section id="viewstat" class="hide">
  <div class="wrap"><div class="card"><div class="empty">
    <i class="ti ti-chart-bar" style="font-size:26px;color:var(--muted)"></i><br><br>
    統計會在下一階段加上<br>頻率趨勢（日／週／月／年）、原因分佈、時段分佈、花費估算
  </div></div></div>
</section>

<!-- ===== 庫存 ===== -->
<section id="viewinv" class="hide">
  <div class="wrap" id="invWrap"></div>
</section>

<!-- ===== 設定 ===== -->
<section id="viewset" class="hide">
  <div class="wrap">
    <div class="sect-title">原因</div>
    <div id="reasonMgr" class="card"></div>

    <div class="sect-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>菸品</span>
      <button class="mini" onclick="openProdSheet()"><i class="ti ti-plus"></i> 新增菸品</button>
    </div>
    <div id="prodMgr" class="card"></div>

    <div class="sect-title">關於</div>
    <div class="card"><div class="empty" style="text-align:left;padding:16px">
      所有資料存在你自己的 Google 試算表。<br>刪掉的原因會停用但保留歷史紀錄，統計仍看得到。
    </div></div>
  </div>
</section>

<!-- action sheet：點紀錄 -->
<div class="overlay" id="editSheet" onclick="if(event.target===this)closeSheets()">
  <div class="sheet">
    <div class="grip"></div>
    <div class="sheet-title">編輯這根</div>
    <div class="sect-title">菸品</div>
    <div id="editProd" class="chips"></div>
    <div id="editPouchWrap" class="hide">
      <div class="sect-title">菸草包</div>
      <div id="editPouch" class="chips"></div>
    </div>
    <div class="sect-title">原因</div>
    <div id="editReason" class="chips"></div>
    <button class="sheet-btn primary" onclick="saveEdit()">更新</button>
    <button class="sheet-btn del" onclick="delEdit()">刪除這根</button>
    <button class="sheet-btn cancel" onclick="closeSheets()">取消</button>
  </div>
</div>

<!-- 新增/編輯菸品 -->
<div class="overlay" id="prodSheet" onclick="if(event.target===this)closeSheets()">
  <div class="sheet">
    <div class="grip"></div>
    <div class="sheet-title" id="prodSheetTitle">新增菸品</div>
    <div class="field"><label>菸種</label>
      <select id="pfCat" onchange="onCatChange()">
        <option value="加熱菸">加熱菸</option>
        <option value="盒菸">盒菸</option>
        <option value="捲菸">捲菸</option>
      </select></div>
    <div class="field"><label>名稱／口味</label><input id="pfName" placeholder="例：Terea 綠"></div>
    <div class="field" id="pfPerBoxRow"><label id="pfPerBoxLbl">每盒支數</label><input id="pfPerBox" class="num" type="number" inputmode="numeric" placeholder="20"></div>
    <div class="field"><label id="pfPriceLbl">售價／盒</label><input id="pfPrice" class="num" type="number" inputmode="numeric" placeholder="0"></div>
    <div class="field"><label>設為常用（預選）</label><input id="pfDefault" type="checkbox" style="flex:0 0 auto;width:22px;height:22px"></div>
    <button class="sheet-btn primary" onclick="saveProd()">儲存</button>
    <button class="sheet-btn del hide" id="pfDelBtn" onclick="delProd()">刪除菸品</button>
    <button class="sheet-btn cancel" onclick="closeSheets()">取消</button>
  </div>
</div>

<div class="save">
  <button id="saveBtn" onclick="doSmoke()">記一根</button>
</div>

<div class="toast" id="toast"></div>

<script>
var $=function(id){return document.getElementById(id);};
function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1600);}
function err(e){toast('發生錯誤：'+(e&&e.message?e.message:e));}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function pad(n){return n<10?'0'+n:''+n;}
function localDateStr(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function ago(ms){var s=(Date.now()-ms)/1000;if(s<90)return '剛剛';var m=s/60;if(m<60)return Math.floor(m)+' 分鐘前';var h=m/60;if(h<24)return Math.floor(h)+' 小時前';return Math.floor(h/24)+' 天前';}
function catTag(c){return c==='加熱菸'?'加熱':c==='盒菸'?'盒菸':c==='捲菸'?'捲菸':'';}

var S={settings:{cur:'NT$'},reasons:[],products:[],pouches:{using:[],done:[]},records:[],thisMonth:''};
var selP=null, selR=null, selPouch=null, editing=null, prodEditId=null;

function show(id,on){$(id).classList.toggle('hide',!on);}
function findP(id){for(var i=0;i<S.products.length;i++)if(S.products[i].id===id)return S.products[i];return null;}
function usingOf(pid){return ((S.pouches&&S.pouches.using)||[]).filter(function(g){return g.productId===pid;});}
function isRollSel(){var p=findP(selP);return !!(p&&p.cat==='捲菸');}
// 收到後端整包狀態就全刷新
function applyState(st){
  if(!st)return;
  if(st.records)S.records=st.records;
  if(st.products)S.products=st.products;
  if(st.pouches)S.pouches=st.pouches;
  if(selP&&!findP(selP))selP=(S.products[0]?S.products[0].id:null);
  renderHero();renderProdChips();renderPouchPick();renderTodayList();renderInv();renderProdMgr();updateSaveBtn();
  $('saveBtn').disabled=false;updateSaveBtn();
}

google.script.run.withSuccessHandler(onBoot).withFailureHandler(err).getBootData();

function onBoot(d){
  S=d;
  if(selP==null){var def=S.products.filter(function(p){return p.isDefault;})[0];selP=def?def.id:(S.products[0]?S.products[0].id:null);}
  $('hdrDate').textContent=(new Date().getMonth()+1)+' / '+new Date().getDate();
  renderAll();
}

function renderAll(){renderHero();renderProdChips();renderPouchPick();renderReasonChips();renderTodayList();renderInv();renderReasonMgr();renderProdMgr();updateSaveBtn();}

function todayRecords(){var t=localDateStr(new Date());return S.records.filter(function(r){return r.dateStr===t;});}

function renderHero(){
  var tr=todayRecords();
  $('todayN').textContent=tr.length;
  var last=S.records[0];
  $('lastAgo').textContent=last?('上一根 · '+ago(last.time)):'今天還沒記';
}

function renderProdChips(){
  var el=$('prodChips');
  if(!S.products.length){el.innerHTML='<div class="empty" style="padding:14px 0;text-align:left">還沒有菸品，先到「設定 → 新增菸品」建立你的口味。</div>';return;}
  el.innerHTML=S.products.map(function(p){
    return '<button class="chip'+(p.id===selP?' on':'')+'" onclick="pickP(\''+p.id+'\')">'+esc(p.name)+'<span class="tag">'+catTag(p.cat)+'</span></button>';
  }).join('');
}
function pickP(id){selP=id;selPouch=null;renderProdChips();renderPouchPick();updateSaveBtn();}

function renderPouchPick(){
  var roll=isRollSel();
  show('pouchPickWrap',roll);
  if(!roll){selPouch=null;return;}
  var us=usingOf(selP);
  if(selPouch&&!us.some(function(x){return x.id===selPouch;}))selPouch=null;
  if(!selPouch&&us.length)selPouch=us[0].id;
  var html=us.map(function(g){
    return '<button class="chip'+(g.id===selPouch?' on':'')+'" onclick="pickPouch(\''+g.id+'\')">'+esc(g.name)+' · 已捲 '+g.rolled+'</button>';
  }).join('');
  html+='<button class="chip add" onclick="openPouchFor(\''+selP+'\')"><i class="ti ti-leaf"></i> Time to Roll · 開新包</button>';
  if(!us.length)html='<div class="empty" style="padding:8px 0;text-align:left">這個口味還沒有使用中的菸草包，先開一包。</div>'+html;
  $('pouchPick').innerHTML=html;
}
function pickPouch(id){selPouch=id;renderPouchPick();updateSaveBtn();}
function openPouchFor(productId){
  google.script.run.withSuccessHandler(function(st){
    applyState(st);
    if(selP===productId){var us=usingOf(productId);selPouch=us.length?us[us.length-1].id:null;renderPouchPick();updateSaveBtn();}
    toast('開了新的一包');
  }).withFailureHandler(err).openPouch({productId:productId});
}

function renderReasonChips(){
  var el=$('reasonChips');
  el.innerHTML=S.reasons.map(function(r){
    return '<button class="chip'+(r.name===selR?' on':'')+'" onclick="pickR(\''+esc(r.name)+'\')">'+esc(r.name)+'</button>';
  }).join('')+'<button class="chip add" onclick="quickAddReason()"><i class="ti ti-plus"></i> 新增</button>';
}
function pickR(n){selR=n;renderReasonChips();updateSaveBtn();}

function updateSaveBtn(){$('saveBtn').disabled=!(selP&&selR&&(!isRollSel()||selPouch));}

function quickAddReason(){
  var n=prompt('新增原因');if(!n)return;
  google.script.run.withSuccessHandler(function(rs){S.reasons=rs;selR=n.trim();renderReasonChips();renderReasonMgr();updateSaveBtn();toast('已新增');})
    .withFailureHandler(err).addReason(n);
}

function renderTodayList(){
  var tr=todayRecords();var el=$('todayList');
  if(!tr.length){el.innerHTML='<div class="empty">今天還沒有紀錄</div>';return;}
  el.innerHTML=tr.map(function(r){
    var sub=[r.productName,catTag(r.cat)].filter(Boolean).join(' · ');
    return '<div class="row tap" onclick="openEdit(\''+r.id+'\')">'+
      '<div class="mid"><div class="t1">'+esc(r.reason||'（無原因）')+'</div>'+(sub?'<div class="t2">'+esc(sub)+'</div>':'')+'</div>'+
      '<div class="rt num">'+r.timeStr+'</div></div>';
  }).join('');
}

function doSmoke(){
  if(!selP){toast('先選菸品');return;}
  if(isRollSel()&&!selPouch){toast('先選或開一包菸草包');return;}
  if(!selR){toast('先選原因');return;}
  $('saveBtn').disabled=true;
  google.script.run.withSuccessHandler(function(st){toast('已記一根 ✓');applyState(st);})
    .withFailureHandler(function(e){$('saveBtn').disabled=false;err(e);})
    .addSmoke({productId:selP,reason:selR,pouchId:isRollSel()?selPouch:''});
}

/* ---- edit a record ---- */
function openEdit(id){
  var r=null;for(var i=0;i<S.records.length;i++)if(S.records[i].id===id){r=S.records[i];break;}
  if(!r)return;editing={id:r.id,month:r.month,productId:r.productId,reason:r.reason,pouchId:r.pouchId||''};
  renderEditChips();$('editSheet').classList.add('show');
}
function renderEditChips(){
  $('editProd').innerHTML=S.products.map(function(p){
    return '<button class="chip'+(p.id===editing.productId?' on':'')+'" onclick="editPickP(\''+p.id+'\')">'+esc(p.name)+'<span class="tag">'+catTag(p.cat)+'</span></button>';
  }).join('');
  var ep=findP(editing.productId);var roll=!!(ep&&ep.cat==='捲菸');
  show('editPouchWrap',roll);
  if(roll){
    var us=usingOf(editing.productId);var ids=us.map(function(x){return x.id;});
    var all=us.slice();
    if(editing.pouchId&&ids.indexOf(editing.pouchId)<0)all.push({id:editing.pouchId,name:'（原本那包）',rolled:''});
    $('editPouch').innerHTML=all.map(function(g){
      return '<button class="chip'+(g.id===editing.pouchId?' on':'')+'" onclick="editPickPouch(\''+g.id+'\')">'+esc(g.name)+(g.rolled!==''?' · 已捲 '+g.rolled:'')+'</button>';
    }).join('')||'<div class="empty" style="padding:6px 0">沒有使用中的菸草包，先到庫存頁開一包。</div>';
  }
  $('editReason').innerHTML=S.reasons.map(function(r){
    return '<button class="chip'+(r.name===editing.reason?' on':'')+'" onclick="editPickR(\''+esc(r.name)+'\')">'+esc(r.name)+'</button>';
  }).join('');
}
function editPickP(id){editing.productId=id;var p=findP(id);if(p&&p.cat==='捲菸'){var us=usingOf(id);editing.pouchId=us.length?us[0].id:(editing.pouchId||'');}else{editing.pouchId='';}renderEditChips();}
function editPickPouch(id){editing.pouchId=id;renderEditChips();}
function editPickR(n){editing.reason=n;renderEditChips();}
function saveEdit(){
  google.script.run.withSuccessHandler(function(st){closeSheets();toast('已更新');applyState(st);})
    .withFailureHandler(err).updateSmoke(editing);
}
function delEdit(){
  if(!confirm('刪除這根紀錄？庫存會加回去。'))return;
  google.script.run.withSuccessHandler(function(st){closeSheets();toast('已刪除');applyState(st);})
    .withFailureHandler(err).deleteSmoke({id:editing.id,month:editing.month});
}

/* ---- settings: reasons ---- */
function renderReasonMgr(){
  var el=$('reasonMgr');
  var rows=S.reasons.map(function(r){
    return '<div class="row"><div class="mid"><div class="t1">'+esc(r.name)+'</div></div>'+
      '<button class="x" onclick="rmReason(\''+esc(r.name)+'\')"><i class="ti ti-x"></i></button></div>';
  }).join('');
  el.innerHTML=rows+'<div class="add-row"><input id="newReason" placeholder="新增原因" onkeydown="if(event.key===\'Enter\')addReasonMgr()"><button onclick="addReasonMgr()">加入</button></div>';
}
function addReasonMgr(){
  var v=$('newReason').value;if(!v.trim())return;
  google.script.run.withSuccessHandler(function(rs){S.reasons=rs;renderReasonMgr();renderReasonChips();toast('已新增');})
    .withFailureHandler(err).addReason(v);
}
function rmReason(n){
  if(!confirm('刪除原因「'+n+'」？歷史紀錄會保留。'))return;
  google.script.run.withSuccessHandler(function(rs){S.reasons=rs;if(selR===n)selR=null;renderReasonMgr();renderReasonChips();updateSaveBtn();toast('已刪除');})
    .withFailureHandler(err).deleteReason(n);
}

/* ---- settings: products ---- */
function renderProdMgr(){
  var el=$('prodMgr');
  if(!S.products.length){el.innerHTML='<div class="empty">還沒有菸品</div>';return;}
  el.innerHTML=S.products.map(function(p){
    var sub=catTag(p.cat)+(p.perBox?' · '+p.perBox+' 支/盒':'')+(p.price?' · '+S.settings.cur+p.price:'');
    return '<div class="row tap" onclick="openProdSheet(\''+p.id+'\')">'+
      '<div class="mid"><div class="t1">'+esc(p.name)+(p.isDefault?' <span class="tag" style="color:var(--accent)">常用</span>':'')+'</div><div class="t2">'+esc(sub)+'</div></div>'+
      '<i class="ti ti-chevron-right" style="color:var(--muted)"></i></div>';
  }).join('');
}
function onCatChange(){
  var roll=$('pfCat').value==='捲菸';
  $('pfPerBoxRow').classList.toggle('hide',roll);
  $('pfPriceLbl').textContent=roll?'售價／包':'售價／盒';
}
function openProdSheet(id){
  prodEditId=(typeof id==='string')?id:null;
  if(prodEditId){
    var p=null;for(var i=0;i<S.products.length;i++)if(S.products[i].id===prodEditId)p=S.products[i];
    $('prodSheetTitle').textContent='編輯菸品';
    $('pfCat').value=p.cat;$('pfName').value=p.name;$('pfPerBox').value=p.perBox||'';$('pfPrice').value=p.price||'';$('pfDefault').checked=p.isDefault;
    $('pfDelBtn').classList.remove('hide');
  }else{
    $('prodSheetTitle').textContent='新增菸品';
    $('pfCat').value='加熱菸';$('pfName').value='';$('pfPerBox').value='';$('pfPrice').value='';$('pfDefault').checked=false;
    $('pfDelBtn').classList.add('hide');
  }
  onCatChange();$('prodSheet').classList.add('show');
}
function saveProd(){
  var payload={cat:$('pfCat').value,name:$('pfName').value,perBox:$('pfPerBox').value,price:$('pfPrice').value,isDefault:$('pfDefault').checked};
  var run=google.script.run.withSuccessHandler(function(ps){S.products=ps;afterProdSave(payload.isDefault,payload.cat,payload.name);})
    .withFailureHandler(err);
  if(prodEditId){payload.id=prodEditId;run.updateProduct(payload);}else{run.addProduct(payload);}
}
function afterProdSave(setDef,cat,name){
  if(prodEditId&&setDef){
    google.script.run.withSuccessHandler(function(ps){S.products=ps;finishProd();}).withFailureHandler(err).setDefaultProduct(prodEditId);
  }else{finishProd();}
}
function finishProd(){closeSheets();if(selP==null&&S.products.length)selP=S.products[0].id;renderProdMgr();renderProdChips();renderPouchPick();renderInv();updateSaveBtn();toast('已儲存');}
function delProd(){
  if(!confirm('刪除這個菸品？歷史紀錄會保留。'))return;
  google.script.run.withSuccessHandler(function(ps){S.products=ps;if(selP===prodEditId)selP=(ps[0]?ps[0].id:null);closeSheets();renderProdMgr();renderProdChips();renderPouchPick();renderInv();updateSaveBtn();toast('已刪除');})
    .withFailureHandler(err).deleteProduct(prodEditId);
}

/* ---- 庫存 ---- */
function renderInv(){
  var el=$('invWrap');if(!el)return;
  var cur=S.settings.cur||'';
  var byCat=function(c){return S.products.filter(function(p){return p.cat===c;});};
  var html='';
  [['加熱菸','ti-flame'],['盒菸','ti-cigarette']].forEach(function(pair){
    var list=byCat(pair[0]);
    html+='<div class="sect-title"><i class="ti '+pair[1]+'"></i> '+pair[0]+'</div>';
    if(!list.length){html+='<div class="card"><div class="empty">還沒有'+pair[0]+'</div></div>';return;}
    html+='<div class="card">'+list.map(function(p){
      var n=p.left||0,b=p.perBox||0;
      var big=(b>0)?(Math.floor(n/b)+' 盒 '+(n%b)+' 支'):(n+' 支');
      var col=(n<=0)?'var(--neg)':(n===1?'var(--warm)':'var(--accent)');
      var sub=(n===1)?'<div style="font-size:12px;color:var(--warm);font-style:italic;font-family:\'Noto Serif TC\',serif">盒仔內賰尾枝</div>'
        :(n<=0?'<div class="t2">沒了</div>':'<div class="t2">剩 '+n+' 支</div>');
      var info=(b?b+' 支/盒':'')+(p.price?' · '+cur+p.price+'/盒':'');
      return '<div class="row"><div class="mid"><div class="t1">'+esc(p.name)+'</div><div class="t2">'+esc(info)+'</div></div>'+
        '<div style="text-align:right;margin-right:8px"><div class="t1 num" style="color:'+col+'">'+big+'</div>'+sub+'</div>'+
        '<button class="mini" onclick="buyPrompt(\''+p.id+'\')">買入</button></div>';
    }).join('')+'</div>';
  });
  var rolls=byCat('捲菸');
  html+='<div class="sect-title"><i class="ti ti-leaf"></i> 捲菸菸草</div>';
  if(!rolls.length){html+='<div class="card"><div class="empty">還沒有捲菸菸草</div></div>';}
  else rolls.forEach(function(p){
    html+='<div class="card" style="margin-bottom:10px">';
    html+='<div class="row"><div class="mid"><div class="t1">'+esc(p.name)+'</div><div class="t2">'+(p.price?cur+p.price+'/包 · ':'')+'未開 '+(p.pouchesLeft||0)+' 包</div></div>'+
      '<button class="mini" onclick="buyPrompt(\''+p.id+'\')">買入</button></div>';
    usingOf(p.id).forEach(function(g){
      html+='<div class="row" style="background:var(--bg)"><div class="mid"><div class="t2">這包已捲</div>'+
        '<div class="num" style="color:var(--accent);font-weight:700;font-size:20px">'+g.rolled+' <span style="font-size:12px;color:var(--muted)">支</span></div></div>'+
        '<button class="mini ghost" onclick="finishPouchDo(\''+g.id+'\')">這包用完</button></div>';
    });
    html+='<div style="padding:12px 14px"><button class="mini" style="width:100%;padding:11px" onclick="openPouchFor(\''+p.id+'\')"><i class="ti ti-leaf"></i> Time to Roll · 開新包</button></div>';
    html+='</div>';
  });
  var done=(S.pouches&&S.pouches.done)||[];
  if(done.length){
    html+='<div class="sect-title">菸草歷史 · 已用完</div><div class="card">'+done.map(function(g){
      return '<div class="row"><div class="mid"><div class="t1">'+esc(g.name)+'</div><div class="t2">'+g.openStr+'–'+g.doneStr+' · 共捲 '+g.rolled+' 支</div></div>'+
        '<div class="rt num">'+(g.perStick?cur+g.perStick+'/支':'')+'</div></div>';
    }).join('')+'</div>';
  }
  el.innerHTML=html;
}
function buyPrompt(id){
  var p=findP(id);if(!p)return;
  var unit=p.isStick?'盒':'包';
  var q=prompt('買入「'+p.name+'」幾'+unit+'？');
  if(q==null)return;q=parseInt(q,10);
  if(!q||q<=0){toast('數量要大於 0');return;}
  google.script.run.withSuccessHandler(function(st){applyState(st);toast('已買入 '+q+' '+unit);})
    .withFailureHandler(err).buyStock({id:id,qty:q});
}
function finishPouchDo(pouchId){
  if(!confirm('這包用完了？會歸檔並算出這包共捲幾支、每支成本。'))return;
  google.script.run.withSuccessHandler(function(st){if(selPouch===pouchId)selPouch=null;applyState(st);toast('已歸檔');})
    .withFailureHandler(err).finishPouch({pouchId:pouchId});
}

/* ---- tabs / sheets ---- */
function showTab(v){
  ['log','stat','inv','set'].forEach(function(k){$('view'+k).classList.toggle('hide',k!==v);});
  document.querySelectorAll('.tabbar button').forEach(function(b){b.classList.toggle('active',b.dataset.v===v);});
  $('saveBtn').parentElement.classList.toggle('hide',v!=='log');
}
function closeSheets(){document.querySelectorAll('.overlay').forEach(function(o){o.classList.remove('show');});}
</script>
</body></html>
