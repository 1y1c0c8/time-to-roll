<!DOCTYPE html><html lang="zh-Hant"><head>
<base target="_top">
<meta charset="utf-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="🚬 Time to Roll">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<style>
:root{
  --bg:#f4f3ef; --card:#ffffff; --ink:#1c1b18; --muted:#8a877f;
  --line:#e7e5de; --accent:#0f766e; --accent-soft:#e3efed;
  --pos:#2f7d4f; --neg:#c0492f; --alt:#6b6f76; --warm:#b06a1f; --warm-bg:#fbf6ee;
  --shadow:0 1px 2px rgba(28,27,24,.05),0 6px 20px rgba(28,27,24,.06);
  --r:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--ink);
  font-family:"Noto Sans TC","Manrope",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{padding:0 0 120px;max-width:560px;margin:0 auto}
.num{font-family:"Manrope",sans-serif;font-variant-numeric:tabular-nums}

header{position:sticky;top:0;z-index:20;background:rgba(244,243,239,.86);
  backdrop-filter:saturate(150%) blur(10px);
  padding:max(14px,env(safe-area-inset-top)) 18px 6px;
  display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{font-family:"Manrope";font-weight:800;font-size:20px;letter-spacing:-.01em}
.brand small{font-weight:600;font-size:12px;color:var(--muted);margin-left:6px}
.wrap{padding:6px 16px}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}

.tabbar{display:flex;gap:6px;margin:2px 16px 8px}
.tabbar button{flex:1;border:0;background:transparent;color:var(--muted);font-weight:700;font-size:14px;
  padding:8px 4px;border-radius:10px;cursor:pointer;font-family:"Noto Sans TC"}
.tabbar button.active{background:var(--accent-soft);color:var(--accent)}
.tabbar i{display:block;font-size:16px;margin-bottom:2px}

.hero{padding:20px 16px 18px;text-align:center;margin-bottom:14px}
.hero .k{font-size:12px;color:var(--muted);margin-bottom:4px}
.hero .n{font-family:"Manrope";font-weight:800;font-size:42px;color:var(--accent);line-height:1}
.hero .n span{font-size:15px;color:var(--muted);font-weight:600}
.hero .last{font-size:12px;color:var(--muted);margin-top:6px}

.sect-title{font-size:12px;color:var(--muted);font-weight:700;margin:16px 4px 8px}
.sec-h{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);font-weight:700;margin:16px 4px 8px;cursor:pointer}
.sec-h i{transition:transform .2s}
.sec-h.collapsed i{transform:rotate(-90deg)}
.sec-body.collapsed{display:none}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:999px;
  padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.add{background:var(--accent-soft);color:var(--accent);border-color:transparent}
.chip .tag{font-size:10px;opacity:.7;margin-left:5px;font-weight:600}

.row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-top:1px solid var(--line)}
.row:first-child{border-top:0}
.row.tap{cursor:pointer} .row.tap:active{background:var(--accent-soft)}
.row .mid{flex:1;min-width:0}
.row .t1{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .t2{font-size:12px;color:var(--muted);margin-top:1px}
.row .rt{font-size:14px;color:var(--muted)}
.row .x{border:0;background:transparent;color:var(--neg);font-size:20px;cursor:pointer;padding:4px 6px}
.row .x:disabled{opacity:.25}
.dragh{color:var(--muted);font-size:20px;padding:2px 6px 2px 2px;cursor:grab;touch-action:none;display:flex;align-items:center}
.sortable-ghost{opacity:.4}
#pickMap,#statMap{height:300px;border-radius:12px;background:#e7e5de}
.leaflet-container{font-family:inherit}
.empty{padding:28px 16px;text-align:center;color:var(--muted);font-size:14px;line-height:1.6}
.hide{display:none!important}

/* segmented control (統計期間) */
.seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:4px;gap:4px;box-shadow:var(--shadow);margin:8px 0 14px}
.seg button{flex:1;border:0;background:transparent;color:var(--muted);padding:10px 0;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
.seg button.active{background:var(--accent-soft);color:var(--accent)}
/* metric row */
.sum{display:flex;padding:16px;gap:8px}
.sum>div{flex:1;text-align:center}
.sum .k{font-size:12px;color:var(--muted);font-weight:600}
.sum .v{font-family:"Manrope";font-weight:800;font-size:22px;margin-top:3px}
/* horizontal bar row (原因/時段) */
.barrow{padding:11px 14px;border-top:1px solid var(--line)}
.barrow:first-child{border-top:0}
.barrow .lab{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;font-weight:600;margin-bottom:6px}
.barrow .track{height:8px;background:var(--bg);border-radius:999px;overflow:hidden}
.barrow .fill{height:100%;background:var(--accent);border-radius:999px}

.save{position:fixed;left:0;right:0;bottom:0;z-index:30;max-width:560px;margin:0 auto;
  padding:12px 16px max(14px,env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--bg) 28%)}
.save button{width:100%;border:0;border-radius:14px;padding:16px;font-size:17px;font-weight:700;
  font-family:"Noto Sans TC";color:#fff;background:var(--accent);box-shadow:var(--shadow);cursor:pointer}
.save button:active{transform:scale(.99)} .save button:disabled{opacity:.45}

.add-row{display:flex;gap:8px;padding:12px 14px}
.add-row input{flex:1;border:1px solid var(--line);background:var(--bg);border-radius:12px;
  padding:11px 12px;font-size:15px;font-family:inherit;outline:none}
.add-row button{border:0;background:var(--accent);color:#fff;border-radius:12px;padding:0 16px;
  font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
.mini{border:0;background:var(--accent-soft);color:var(--accent);border-radius:999px;
  padding:6px 12px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}
.mini.ghost{background:transparent;color:var(--muted)}

/* bottom-sheet overlay */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(28,27,24,.42);display:flex;align-items:flex-end;
  justify-content:center;opacity:0;pointer-events:none;transition:.2s}
.overlay.show{opacity:1;pointer-events:auto}
.sheet{background:var(--card);width:100%;max-width:560px;max-height:92vh;overflow:auto;border-radius:20px 20px 0 0;
  padding:8px 16px max(16px,env(safe-area-inset-bottom));transform:translateY(24px);transition:.2s}
.overlay.show .sheet{transform:translateY(0)}
.grip{width:38px;height:4px;border-radius:2px;background:var(--line);margin:8px auto 12px}
.sheet-title{font-family:"Manrope";font-weight:800;font-size:17px;text-align:center;margin:2px 0 14px}
.sheet-btn{width:100%;border:0;border-radius:13px;padding:15px;font-size:16px;font-weight:700;
  font-family:"Noto Sans TC";margin-top:8px;cursor:pointer}
.sheet-btn.primary{background:var(--accent);color:#fff}
.sheet-btn.del{background:var(--neg);color:#fff}
.sheet-btn.cancel{background:transparent;color:var(--muted)}
.field{padding:12px 2px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}
.field label{font-size:14px;color:var(--muted);font-weight:600;white-space:nowrap}
.field select,.field input{flex:1;border:0;background:transparent;text-align:right;font-size:16px;
  color:var(--ink);font-family:inherit;outline:none;-webkit-appearance:none;font-weight:600}

.toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%) translateY(20px);background:var(--ink);
  color:#fff;padding:11px 20px;border-radius:999px;font-size:14px;font-weight:600;opacity:0;transition:.25s;
  z-index:70;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <div class="brand">Time to Roll <small>抽菸紀錄</small></div>
  <div id="hdrDate" class="num" style="font-size:12px;color:var(--muted)"></div>
</header>

<div class="tabbar">
  <button data-v="log" class="active" onclick="showTab('log')"><i class="ti ti-plus"></i>記錄</button>
  <button data-v="stat" onclick="showTab('stat')"><i class="ti ti-chart-bar"></i>統計</button>
  <button data-v="inv" onclick="showTab('inv')"><i class="ti ti-box"></i>庫存</button>
  <button data-v="set" onclick="showTab('set')"><i class="ti ti-settings"></i>設定</button>
</div>

<!-- ===== 記錄 ===== -->
<section id="viewlog">
  <div class="wrap">
    <div class="card hero">
      <div class="k">今天已抽</div>
      <div class="n"><span id="todayN" class="num">0</span> <span>支</span></div>
      <div id="lastAgo" class="last"></div>
    </div>

    <div id="pickArea">
      <div class="sect-title">菸品</div>
      <div id="prodChips" class="chips"></div>
      <div id="pouchPickWrap" class="hide">
        <div class="sect-title">使用中的菸草包</div>
        <div id="pouchPick" class="chips"></div>
      </div>
      <div class="sect-title">原因</div>
      <div id="reasonChips" class="chips"></div>
      <div class="sect-title">跟誰（可選）</div>
      <div id="peopleChips" class="chips"></div>
      <div class="sect-title">在哪（可選）</div>
      <div id="placeChips" class="chips"></div>
    </div>

    <div class="sect-title">今天的紀錄</div>
    <div id="todayList" class="card"></div>
  </div>
</section>

<!-- ===== 統計 ===== -->
<section id="viewstat" class="hide">
  <div class="wrap">
    <div class="seg" id="statSeg">
      <button data-g="day" onclick="setGran('day')">日</button>
      <button data-g="week" onclick="setGran('week')">週</button>
      <button data-g="month" class="active" onclick="setGran('month')">月</button>
      <button data-g="year" onclick="setGran('year')">年</button>
    </div>
    <div class="card field" id="pickerField" style="border-top:0;border-radius:var(--r);margin-bottom:6px;padding-left:16px;padding-right:16px">
      <label id="pickerLabel">月份</label>
      <span id="pickerSlot" style="flex:1;text-align:right"></span>
    </div>
    <div id="statRange" style="text-align:center;font-size:12px;color:var(--muted);margin:0 4px 12px"></div>
    <div class="card sum" id="statSum"></div>
    <div class="sec-h" id="secH-trend" onclick="toggleSec('trend')">趨勢 <i class="ti ti-chevron-down"></i></div>
    <div class="sec-body" id="sec-trend"><div class="card" style="padding:12px 10px"><div style="height:220px"><canvas id="trendChart"></canvas></div></div></div>

    <div class="sec-h" id="secH-reason" onclick="toggleSec('reason')">原因分佈 <i class="ti ti-chevron-down"></i></div>
    <div class="sec-body" id="sec-reason"><div class="card" id="reasonDist"></div></div>

    <div class="sec-h" id="secH-hour" onclick="toggleSec('hour')">時段分佈 <i class="ti ti-chevron-down"></i></div>
    <div class="sec-body" id="sec-hour"><div class="card" id="hourDist"></div></div>

    <div class="sec-h" id="secH-place" onclick="toggleSec('place')">地點 <i class="ti ti-chevron-down"></i></div>
    <div class="sec-body" id="sec-place">
      <div class="card" id="placeDist" style="margin-bottom:10px"></div>
      <div class="card" style="padding:8px"><div id="statMap"></div></div>
    </div>
  </div>
</section>

<!-- ===== 庫存 ===== -->
<section id="viewinv" class="hide">
  <div class="wrap" id="invWrap"></div>
</section>

<!-- ===== 設定 ===== -->
<section id="viewset" class="hide">
  <div class="wrap">
    <div class="sect-title">原因</div>
    <div id="reasonMgr" class="card"></div>

    <div class="sect-title">人物</div>
    <div id="peopleMgr" class="card"></div>

    <div class="sect-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>地點</span>
      <button class="mini" onclick="openPlaceSheet()"><i class="ti ti-plus"></i> 新增地點</button>
    </div>
    <div id="placeMgr" class="card"></div>

    <div class="sect-title">偏好</div>
    <div class="card">
      <div class="field"><label>幣別</label><input id="setCur" onchange="savePref('幣別',this.value)"></div>
      <div class="field"><label>預設每盒支數</label><input id="setPerBox" class="num" type="number" inputmode="numeric" onchange="savePref('預設每盒支數',this.value)"></div>
      <div class="field"><label>地圖樣式</label><select id="setMapStyle" onchange="savePref('地圖樣式',this.value)">
        <option value="voyager">Google 風</option>
        <option value="positron">乾淨淺色</option>
        <option value="osm">標準 OSM</option>
        <option value="satellite">衛星圖</option>
      </select></div>
    </div>

    <div class="sect-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>菸品</span>
      <button class="mini" onclick="openProdSheet()"><i class="ti ti-plus"></i> 新增菸品</button>
    </div>
    <div id="prodMgr" class="card"></div>

    <div class="sect-title">關於</div>
    <div class="card"><div class="empty" style="text-align:left;padding:16px">
      所有資料存在你自己的 Google 試算表。<br>刪掉的原因會停用但保留歷史紀錄，統計仍看得到。
    </div></div>
  </div>
</section>

<!-- action sheet：點紀錄 -->
<div class="overlay" id="editSheet" onclick="if(event.target===this)closeSheets()">
  <div class="sheet">
    <div class="grip"></div>
    <div class="sheet-title">編輯這根</div>
    <div class="sect-title">菸品</div>
    <div id="editProd" class="chips"></div>
    <div id="editPouchWrap" class="hide">
      <div class="sect-title">菸草包</div>
      <div id="editPouch" class="chips"></div>
    </div>
    <div class="sect-title">原因</div>
    <div id="editReason" class="chips"></div>
    <div class="sect-title">跟誰（可選）</div>
    <div id="editPeople" class="chips"></div>
    <div class="sect-title">在哪（可選）</div>
    <div id="editPlace" class="chips"></div>
    <div class="field" style="margin-top:6px"><label>時間</label><input type="datetime-local" id="editTime"></div>
    <button class="sheet-btn primary" onclick="saveEdit()">更新</button>
    <button class="sheet-btn del" onclick="delEdit()">刪除這根</button>
    <button class="sheet-btn cancel" onclick="closeSheets()">取消</button>
  </div>
</div>

<!-- 新增/編輯菸品 -->
<div class="overlay" id="prodSheet" onclick="if(event.target===this)closeSheets()">
  <div class="sheet">
    <div class="grip"></div>
    <div class="sheet-title" id="prodSheetTitle">新增菸品</div>
    <div class="field"><label>菸種</label>
      <select id="pfCat" onchange="onCatChange()">
        <option value="加熱菸">加熱菸</option>
        <option value="盒菸">盒菸</option>
        <option value="捲菸">捲菸</option>
      </select></div>
    <div class="field"><label>名稱／口味</label><input id="pfName" placeholder="例：Terea 綠"></div>
    <div class="field" id="pfPerBoxRow"><label id="pfPerBoxLbl">每盒支數</label><input id="pfPerBox" class="num" type="number" inputmode="numeric" placeholder="20"></div>
    <div class="field"><label id="pfPriceLbl">售價／盒</label><input id="pfPrice" class="num" type="number" inputmode="numeric" placeholder="0"></div>
    <button class="sheet-btn primary" onclick="saveProd()">儲存</button>
    <button class="sheet-btn del hide" id="pfDelBtn" onclick="delProd()">刪除菸品</button>
    <button class="sheet-btn cancel" onclick="closeSheets()">取消</button>
  </div>
</div>

<!-- 庫存編輯 -->
<div class="overlay" id="invSheet" onclick="if(event.target===this)closeSheets()">
  <div class="sheet">
    <div class="grip"></div>
    <div class="sheet-title" id="invSheetTitle">庫存</div>
    <button class="sheet-btn edit" id="invBuyBtn" onclick="invBuy()">買入</button>
    <button class="sheet-btn edit" id="invSetBtn" onclick="invSet()">設定剩餘</button>
    <button class="sheet-btn cancel" onclick="closeSheets()">取消</button>
  </div>
</div>

<!-- 菸草包動作 -->
<div class="overlay" id="pouchSheet" onclick="if(event.target===this)closeSheets()">
  <div class="sheet">
    <div class="grip"></div>
    <div class="sheet-title" id="pouchSheetTitle">菸草包</div>
    <button class="sheet-btn edit" onclick="pouchSetRolled()">設定已捲支數</button>
    <button class="sheet-btn primary" onclick="pouchFinish()">這包用完</button>
    <button class="sheet-btn del" onclick="pouchDelete()">刪除這包</button>
    <button class="sheet-btn cancel" onclick="closeSheets()">取消</button>
  </div>
</div>

<!-- 地點編輯 -->
<div class="overlay" id="placeSheet" onclick="if(event.target===this)closeSheets()">
  <div class="sheet">
    <div class="grip"></div>
    <div class="sheet-title" id="placeSheetTitle">新增地點</div>
    <div class="field"><label>名稱</label><input id="placeName" placeholder="例：陽台、公司樓下"></div>
    <div class="field"><label>座標</label><span id="placeCoord" class="num" style="color:var(--muted);font-size:14px">尚未設定座標</span></div>
    <button class="sheet-btn edit" onclick="placeGrabGPS()"><i class="ti ti-current-location"></i> 抓目前位置</button>
    <button class="sheet-btn edit" onclick="openMapPick()"><i class="ti ti-map-pin"></i> 在地圖上點選</button>
    <button class="sheet-btn cancel" id="placeClearBtn" onclick="placeClearCoord()">清除座標</button>
    <button class="sheet-btn primary" onclick="savePlace()">儲存</button>
    <button class="sheet-btn del hide" id="pfDelPlace" onclick="rmPlaceFromSheet()">刪除地點</button>
    <button class="sheet-btn cancel" onclick="closeSheets()">取消</button>
  </div>
</div>

<!-- 地圖點選 -->
<div class="overlay" id="mapPickSheet" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="sheet">
    <div class="grip"></div>
    <div class="sheet-title">在地圖上點選位置</div>
    <div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:8px">點地圖任一處放置圖釘，或拖曳圖釘微調</div>
    <div id="pickMap"></div>
    <button class="sheet-btn primary" onclick="confirmMapPick()">使用這個位置</button>
    <button class="sheet-btn cancel" onclick="document.getElementById('mapPickSheet').classList.remove('show')">取消</button>
  </div>
</div>

<div class="save">
  <button id="saveBtn" onclick="doSmoke()" disabled>記一根</button>
</div>

<div class="toast" id="toast"></div>

<script>
var $=function(id){return document.getElementById(id);};
function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},1600);}
function err(e){toast('發生錯誤：'+(e&&e.message?e.message:e));}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function pad(n){return n<10?'0'+n:''+n;}
function localDateStr(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function ago(ms){var s=(Date.now()-ms)/1000;if(s<90)return '剛剛';var m=s/60;if(m<60)return Math.floor(m)+' 分鐘前';var h=m/60;if(h<24)return Math.floor(h)+' 小時前';return Math.floor(h/24)+' 天前';}
function catTag(c){return c==='加熱菸'?'加熱':c==='盒菸'?'盒菸':c==='捲菸'?'捲菸':'';}

var S={settings:{cur:'NT$',mapStyle:'voyager'},reasons:[],people:[],places:[],products:[],pouches:{using:[],done:[]},records:[],thisMonth:''};
var selP=null, selR=null, selPouch=null, selPeople=[], selPlace=null, editing=null, prodEditId=null;
var placeEditName=null, placeTmp={name:'',lat:null,lng:null}, pickMap=null, pickMarker=null;
var BASEMAPS={
  voyager:{url:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',sub:'abcd'},
  positron:{url:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',sub:'abcd'},

function show(id,on){$(id).classList.toggle('hide',!on);}
function findP(id){for(var i=0;i<S.products.length;i++)if(S.products[i].id===id)return S.products[i];return null;}
function usingOf(pid){return ((S.pouches&&S.pouches.using)||[]).filter(function(g){return g.productId===pid;});}
function isRollSel(){var p=findP(selP);return !!(p&&p.cat==='捲菸');}
// 收到後端整包狀態就全刷新
function applyState(st){
  if(!st)return;
  if(st.records)S.records=st.records;
  if(st.products)S.products=st.products;
  if(st.pouches)S.pouches=st.pouches;
  if(selP&&!findP(selP))selP=(S.products[0]?S.products[0].id:null);
  renderHero();renderProdChips();renderPouchPick();renderTodayList();renderInv();renderProdMgr();updateSaveBtn();
  $('saveBtn').disabled=false;updateSaveBtn();
}

function onBoot(d){
  S=d;
  if(selP==null){selP=S.products[0]?S.products[0].id:null;}

}

  el.innerHTML=S.products.map(function(p){

  }).join('');

function pickP(id){selP=id;selPouch=null;renderProdChips();renderPouchPick();updateSaveBtn();}

function renderPouchPick(){
  var roll=isRollSel();
  show('pouchPickWrap',roll);
  if(!roll){selPouch=null;return;}
  var us=usingOf(selP);
  if(selPouch&&!us.some(function(x){return x.id===selPouch;}))selPouch=null;
  if(!selPouch&&us.length)selPouch=us[0].id;
  var html=us.map(function(g){
    return '<button class="chip'+(g.id===selPouch?' on':'')+'" onclick="pickPouch(\''+g.id+'\')">'+esc(g.name)+' · 已捲 '+g.rolled+'</button>';
  }).join('');
  html+='<button class="chip add" onclick="openPouchFor(\''+selP+'\')"><i class="ti ti-leaf"></i> Time to Roll · 開新包</button>';
  if(!us.length)html='<div class="empty" style="padding:8px 0;text-align:left">這個口味還沒有使用中的菸草包，先開一包。</div>'+html;
  $('pouchPick').innerHTML=html;
}
function pickPouch(id){selPouch=id;renderPouchPick();updateSaveBtn();}
function openPouchFor(productId){

function quickAddPlace(){
  var n=prompt('新增地點（例：某某酒吧）');if(!n||!n.trim())return;n=n.trim();

    google.script.run.withSuccessHandler(function(ps){S.places=ps;selPlace=n;renderPlaceChips();renderPlaceMgr();toast(lat!=null?'已新增（含目前位置）':'已新增（無座標）');})

/* ---- edit a record ---- */
function openEdit(id){
  var r=null;for(var i=0;i<S.records.length;i++)if(S.records[i].id===id){r=S.records[i];break;}
  if(!r)return;editing={id:r.id,month:r.month,productId:r.productId,reason:r.reason,pouchId:r.pouchId||'',people:(r.people||[]).slice(),place:r.place||''};
  editing._origTime=toLocalInput(r.time);$('editTime').value=editing._origTime;
  renderEditChips();$('editSheet').classList.add('show');
}
function toLocalInput(ms){var d=new Date(ms);return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());}
function renderEditChips(){
  $('editProd').innerHTML=S.products.map(function(p){
    return '<button class="chip'+(p.id===editing.productId?' on':'')+'" onclick="editPickP(\''+p.id+'\')">'+esc(p.name)+'<span class="tag">'+catTag(p.cat)+'</span></button>';
  }).join('');
  var ep=findP(editing.productId);var roll=!!(ep&&ep.cat==='捲菸');
  show('editPouchWrap',roll);
  if(roll){
    var us=usingOf(editing.productId);var ids=us.map(function(x){return x.id;});
    var all=us.slice();
    if(editing.pouchId&&ids.indexOf(editing.pouchId)<0)all.push({id:editing.pouchId,name:'（原本那包）',rolled:''});
    $('editPouch').innerHTML=all.map(function(g){
      return '<button class="chip'+(g.id===editing.pouchId?' on':'')+'" onclick="editPickPouch(\''+g.id+'\')">'+esc(g.name)+(g.rolled!==''?' · 已捲 '+g.rolled:'')+'</button>';
    }).join('')||'<div class="empty" style="padding:6px 0">沒有使用中的菸草包，先到庫存頁開一包。</div>';
  }
  $('editReason').innerHTML=S.reasons.map(function(r){
    return '<button class="chip'+(r.name===editing.reason?' on':'')+'" onclick="editPickR(\''+esc(r.name)+'\')">'+esc(r.name)+'</button>';
  }).join('');
  $('editPeople').innerHTML=S.people.map(function(pp){
    return '<button class="chip'+(editing.people.indexOf(pp.name)>=0?' on':'')+'" onclick="editTogglePerson(\''+esc(pp.name)+'\')">'+esc(pp.name)+'</button>';
  }).join('')||'<div class="empty" style="padding:6px 0;text-align:left">還沒有人物，去設定新增</div>';
  $('editPlace').innerHTML=S.places.map(function(pl){
    return '<button class="chip'+(editing.place===pl.name?' on':'')+'" onclick="editPickPlace(\''+esc(pl.name)+'\')">'+esc(pl.name)+'</button>';
  }).join('')||'<div class="empty" style="padding:6px 0;text-align:left">還沒有地點，去設定新增</div>';
}

function editPickPlace(n){editing.place=(editing.place===n?'':n);renderEditChips();}
function editPickP(id){editing.productId=id;var p=findP(id);if(p&&p.cat==='捲菸'){var us=usingOf(id);editing.pouchId=us.length?us[0].id:(editing.pouchId||'');}else{editing.pouchId='';}renderEditChips();}

/* ---- place add/edit sheet ---- */
function openPlaceSheet(name){
  if(typeof name==='string'){
    placeEditName=name;
    var pl=S.places.filter(function(x){return x.name===name;})[0]||{name:name};
    placeTmp={name:name,lat:(pl.lat==null?null:pl.lat),lng:(pl.lng==null?null:pl.lng)};
    $('placeSheetTitle').textContent='編輯地點';$('pfDelPlace').classList.remove('hide');
  }else{
    placeEditName=null;placeTmp={name:'',lat:null,lng:null};
    $('placeSheetTitle').textContent='新增地點';$('pfDelPlace').classList.add('hide');
  }
  $('placeName').value=placeTmp.name;renderPlaceCoord();$('placeSheet').classList.add('show');
}
function renderPlaceCoord(){
  var el=$('placeCoord');
  if(placeTmp.lat!=null){el.style.color='var(--accent)';el.textContent='📍 '+placeTmp.lat.toFixed(5)+', '+placeTmp.lng.toFixed(5);}
  else{el.style.color='var(--muted)';el.textContent='尚未設定座標';}

function placeGrabGPS(){
  if(!navigator.geolocation){toast('這裝置無法定位');return;}
  toast('抓取目前位置…');
  navigator.geolocation.getCurrentPosition(
    function(p){placeTmp.lat=p.coords.latitude;placeTmp.lng=p.coords.longitude;renderPlaceCoord();toast('已抓到位置');},
    function(e){toast('抓不到位置（code '+e.code+'）');},
    {enableHighAccuracy:true,timeout:12000,maximumAge:0});
}
function placeClearCoord(){placeTmp.lat=null;placeTmp.lng=null;renderPlaceCoord();}
function savePlace(){
  var nm=$('placeName').value.trim();if(!nm){toast('要填名稱');return;}
  if(placeEditName){
    var setCoord=function(){google.script.run.withSuccessHandler(function(ps){S.places=ps;closeSheets();renderPlaceMgr();renderPlaceChips();toast('已儲存');}).withFailureHandler(err).setPlaceCoord({name:nm,lat:placeTmp.lat,lng:placeTmp.lng});};
    if(nm!==placeEditName){
      google.script.run.withSuccessHandler(function(ps){S.places=ps;if(selPlace===placeEditName)selPlace=nm;setCoord();}).withFailureHandler(err).renamePlace(placeEditName,nm);
    }else setCoord();
  }else{
    google.script.run.withSuccessHandler(function(ps){S.places=ps;closeSheets();renderPlaceMgr();renderPlaceChips();toast('已新增');}).withFailureHandler(err).addPlace({name:nm,lat:placeTmp.lat,lng:placeTmp.lng});
  }
}
function rmPlaceFromSheet(){
  if(!confirm('刪除地點「'+placeEditName+'」？歷史紀錄會保留。'))return;
  google.script.run.withSuccessHandler(function(ps){S.places=ps;if(selPlace===placeEditName)selPlace=null;closeSheets();renderPlaceMgr();renderPlaceChips();toast('已刪除');}).withFailureHandler(err).deletePlace(placeEditName);
}

/* ---- map pin picker ---- */
function openMapPick(){
  $('mapPickSheet').classList.add('show');
  setTimeout(function(){
    var here=(placeTmp.lat!=null)?[placeTmp.lat,placeTmp.lng]:[22.9997,120.2270];
    var z=(placeTmp.lat!=null)?16:13;
    if(!pickMap){
      pickMap=L.map('pickMap').setView(here,z);
      pickMap._tile=tileLayerFor(S.settings.mapStyle);pickMap._tile.addTo(pickMap);
      pickMarker=L.marker(here,{draggable:true}).addTo(pickMap);
      pickMap.on('click',function(e){pickMarker.setLatLng(e.latlng);});
    }else{
      if(pickMap._tile)pickMap.removeLayer(pickMap._tile);
      pickMap._tile=tileLayerFor(S.settings.mapStyle);pickMap._tile.addTo(pickMap);
      pickMap.setView(here,z);pickMarker.setLatLng(here);
    }
    pickMap.invalidateSize();
  },260);
}
function confirmMapPick(){
  if(pickMarker){var ll=pickMarker.getLatLng();placeTmp.lat=ll.lat;placeTmp.lng=ll.lng;renderPlaceCoord();}
  $('mapPickSheet').classList.remove('show');
}

/* ---- prefs ---- */
function renderPrefs(){
  if(!$('setCur'))return;
  $('setCur').value=S.settings.cur||'';
  $('setPerBox').value=S.settings.perBox||20;
  $('setMapStyle').value=S.settings.mapStyle||'voyager';
}
function savePref(key,val){
  google.script.run.withSuccessHandler(function(s){S.settings=s;renderPrefs();renderProdMgr();renderInv();if(statMap&&secState.place)renderStatMap();toast('已更新');}).withFailureHandler(err).setSetting(key,val);
}

/* ---- settings: products ---- */
function renderProdMgr(){
  var el=$('prodMgr');
  if(!S.products.length){el.innerHTML='<div class="empty">還沒有菸品</div>';return;}
  el.innerHTML=S.products.map(function(p){
    var sub=catTag(p.cat)+(p.perBox?' · '+p.perBox+' 支/盒':'')+(p.price?' · '+S.settings.cur+p.price:'');
    return '<div class="row tap" onclick="openProdSheet(\''+p.id+'\')">'+
      '<div class="mid"><div class="t1">'+esc(p.name)+'</div><div class="t2">'+esc(sub)+'</div></div>'+
      '<i class="ti ti-chevron-right" style="color:var(--muted)"></i></div>';
  }).join('');
}
function onCatChange(){
  var roll=$('pfCat').value==='捲菸';
  $('pfPerBoxRow').classList.toggle('hide',roll);
  $('pfPriceLbl').textContent=roll?'售價／包':'售價／盒';
}
function openProdSheet(id){
  prodEditId=(typeof id==='string')?id:null;
  if(prodEditId){
    var p=null;for(var i=0;i<S.products.length;i++)if(S.products[i].id===prodEditId)p=S.products[i];
    $('prodSheetTitle').textContent='編輯菸品';
    $('pfCat').value=p.cat;$('pfName').value=p.name;$('pfPerBox').value=p.perBox||'';$('pfPrice').value=p.price||'';
    $('pfDelBtn').classList.remove('hide');
  }else{
    $('prodSheetTitle').textContent='新增菸品';
    $('pfCat').value='加熱菸';$('pfName').value='';$('pfPerBox').value='';$('pfPrice').value='';
    $('pfDelBtn').classList.add('hide');
  }
  onCatChange();$('prodSheet').classList.add('show');
}
function saveProd(){
  var payload={cat:$('pfCat').value,name:$('pfName').value,perBox:$('pfPerBox').value,price:$('pfPrice').value};
  var run=google.script.run.withSuccessHandler(function(ps){S.products=ps;finishProd();}).withFailureHandler(err);
  if(prodEditId){payload.id=prodEditId;run.updateProduct(payload);}else{run.addProduct(payload);}
}
function finishProd(){closeSheets();if(selP==null&&S.products.length)selP=S.products[0].id;renderProdMgr();renderProdChips();renderPouchPick();renderInv();updateSaveBtn();toast('已儲存');}
function delProd(){
  if(!confirm('刪除這個菸品？歷史紀錄會保留。'))return;
  google.script.run.withSuccessHandler(function(ps){S.products=ps;if(selP===prodEditId)selP=(ps[0]?ps[0].id:null);closeSheets();renderProdMgr();renderProdChips();renderPouchPick();renderInv();updateSaveBtn();toast('已刪除');})
    .withFailureHandler(err).deleteProduct(prodEditId);
}

/* ---- 庫存 ---- */
function renderInv(){
  var el=$('invWrap');if(!el)return;
  var cur=S.settings.cur||'';
  var byCat=function(c){return S.products.filter(function(p){return p.cat===c;});};
  var html='';
  [['加熱菸','ti-flame'],['盒菸','ti-cigarette']].forEach(function(pair){
    var list=byCat(pair[0]);
    html+='<div class="sect-title"><i class="ti '+pair[1]+'"></i> '+pair[0]+'</div>';
    if(!list.length){html+='<div class="card"><div class="empty">還沒有'+pair[0]+'</div></div>';return;}
    html+='<div class="card">'+list.map(function(p){
      var n=p.left||0,b=p.perBox||0;
      var big=(b>0)?(Math.floor(n/b)+' 盒 '+(n%b)+' 支'):(n+' 支');
      var col=(n<=0)?'var(--neg)':(n===1?'var(--warm)':'var(--accent)');
      var sub=(n===1)?'<div style="font-size:12px;color:var(--warm);font-style:italic;font-family:\'Noto Serif TC\',serif">盒仔內賰尾枝</div>'
        :(n<=0?'<div class="t2">沒了</div>':'<div class="t2">剩 '+n+' 支</div>');
      var info=(b?b+' 支/盒':'')+(p.price?' · '+cur+p.price+'/盒':'');
      return '<div class="row tap" onclick="openInvSheet(\''+p.id+'\')"><div class="mid"><div class="t1">'+esc(p.name)+'</div><div class="t2">'+esc(info)+'</div></div>'+
        '<div style="text-align:right;margin-right:6px"><div class="t1 num" style="color:'+col+'">'+big+'</div>'+sub+'</div>'+
        '<i class="ti ti-chevron-right" style="color:var(--muted)"></i></div>';
    }).join('')+'</div>';
  });
  var rolls=byCat('捲菸');
  html+='<div class="sect-title"><i class="ti ti-leaf"></i> 捲菸菸草</div>';
  if(!rolls.length){html+='<div class="card"><div class="empty">還沒有捲菸菸草</div></div>';}
  else rolls.forEach(function(p){
    html+='<div class="card" style="margin-bottom:10px">';
    html+='<div class="row tap" onclick="openInvSheet(\''+p.id+'\')"><div class="mid"><div class="t1">'+esc(p.name)+'</div><div class="t2">'+(p.price?cur+p.price+'/包 · ':'')+'未開 '+(p.pouchesLeft||0)+' 包</div></div>'+
      '<i class="ti ti-chevron-right" style="color:var(--muted)"></i></div>';
    usingOf(p.id).forEach(function(g){
      html+='<div class="row tap" style="background:var(--bg)" onclick="openPouchSheet(\''+g.id+'\')"><div class="mid"><div class="t2">這包已捲</div>'+
        '<div class="num" style="color:var(--accent);font-weight:700;font-size:20px">'+g.rolled+' <span style="font-size:12px;color:var(--muted)">支</span></div></div>'+
        '<i class="ti ti-chevron-right" style="color:var(--muted)"></i></div>';
    });
    html+='<div style="padding:12px 14px"><button class="mini" style="width:100%;padding:11px" onclick="openPouchFor(\''+p.id+'\')"><i class="ti ti-leaf"></i> Time to Roll · 開新包</button></div>';
    html+='</div>';
  });
  var done=(S.pouches&&S.pouches.done)||[];
  if(done.length){
    html+='<div class="sect-title">菸草歷史 · 已用完</div><div class="card">'+done.map(function(g){
      return '<div class="row"><div class="mid"><div class="t1">'+esc(g.name)+'</div><div class="t2">'+g.openStr+'–'+g.doneStr+' · 共捲 '+g.rolled+' 支</div></div>'+
        '<div class="rt num">'+(g.perStick?cur+g.perStick+'/支':'')+'</div></div>';
    }).join('')+'</div>';
  }
  el.innerHTML=html;
}
function buyPrompt(id){
  var p=findP(id);if(!p)return;
  var unit=p.isStick?'盒':'包';
  var q=prompt('買入「'+p.name+'」幾'+unit+'？');
  if(q==null)return;q=parseInt(q,10);
  if(!q||q<=0){toast('數量要大於 0');return;}
  google.script.run.withSuccessHandler(function(st){applyState(st);toast('已買入 '+q+' '+unit);})
    .withFailureHandler(err).buyStock({id:id,qty:q});
}
function finishPouchDo(pouchId){
  if(!confirm('這包用完了？會歸檔並算出這包共捲幾支、每支成本。'))return;
  google.script.run.withSuccessHandler(function(st){if(selPouch===pouchId)selPouch=null;applyState(st);toast('已歸檔');})
    .withFailureHandler(err).finishPouch({pouchId:pouchId});
}

/* ---- 庫存編輯（買入 / 設定剩餘） ---- */
var invEditId=null, pouchEditId=null;
function openInvSheet(id){
  var p=findP(id);if(!p)return;invEditId=id;
  $('invSheetTitle').textContent=p.name;
  $('invBuyBtn').textContent=p.isStick?'買入（＋盒）':'買入（＋包）';
  $('invSetBtn').textContent=p.isStick?'設定剩餘支數（半盒也行）':'設定未開包數';
  $('invSheet').classList.add('show');
}
function invBuy(){var id=invEditId;closeSheets();buyPrompt(id);}
function invSet(){
  var p=findP(invEditId);if(!p)return;var id=invEditId;closeSheets();
  var cur=p.isStick?p.left:(p.pouchesLeft||0);
  var unit=p.isStick?'支':'包';
  var q=prompt('直接設定「'+p.name+'」目前剩餘'+unit+'（例：半盒加熱菸就填實際支數）',cur);
  if(q==null)return;q=parseInt(q,10);
  if(isNaN(q)||q<0){toast('要填 0 以上的數字');return;}
  google.script.run.withSuccessHandler(function(st){applyState(st);toast('已更新');})
    .withFailureHandler(err).setStock({id:id,value:q});
}
function findPouch(id){var u=(S.pouches&&S.pouches.using)||[];for(var i=0;i<u.length;i++)if(u[i].id===id)return u[i];return null;}
function openPouchSheet(id){var g=findPouch(id);pouchEditId=id;$('pouchSheetTitle').textContent=(g?g.name:'菸草包')+(g?' · 已捲 '+g.rolled+' 支':'');$('pouchSheet').classList.add('show');}
function pouchSetRolled(){
  var g=findPouch(pouchEditId);var id=pouchEditId;closeSheets();
  var q=prompt('設定「'+(g?g.name:'')+'」這包已捲支數（修正／半包）',g?g.rolled:0);
  if(q==null)return;q=parseInt(q,10);
  if(isNaN(q)||q<0){toast('要填 0 以上的數字');return;}
  google.script.run.withSuccessHandler(function(st){applyState(st);toast('已更新');})
    .withFailureHandler(err).updatePouch({pouchId:id,rolled:q});
}
function pouchFinish(){var id=pouchEditId;closeSheets();finishPouchDo(id);}
function pouchDelete(){
  if(!confirm('刪除這包菸草包？（已記的捲菸紀錄不會變動）'))return;
  var id=pouchEditId;closeSheets();
  google.script.run.withSuccessHandler(function(st){if(selPouch===id)selPouch=null;applyState(st);toast('已刪除');})
    .withFailureHandler(err).deletePouch({pouchId:id});
}

/* ---- 統計 ---- */
var statGran='month', statKey='', trendChart=null, STAT=null, statMap=null, heatLayer=null;
var secState={trend:true,reason:true,hour:false,place:false};
function applySecState(){
  ['trend','reason','hour','place'].forEach(function(k){
    var h=$('secH-'+k),b=$('sec-'+k);if(!h||!b)return;
    h.classList.toggle('collapsed',!secState[k]);
    b.classList.toggle('collapsed',!secState[k]);
  });
}
function toggleSec(k){
  secState[k]=!secState[k];applySecState();
  if(secState[k]&&STAT){
    if(k==='trend')drawTrend(STAT);
    if(k==='place')setTimeout(renderStatMap,80);
  }
}
function renderPlaceStats(d){
  var el=$('placeDist');if(!el)return;
  var arr=(d.places||[]);
  if(!arr.length&&!d.noPlace){el.innerHTML='<div class="empty">這段期間沒有地點紀錄</div>';return;}
  var max=(arr[0]&&arr[0].count)||1;
  var tot=arr.reduce(function(s,x){return s+x.count;},0)+(d.noPlace||0);
  var html=arr.map(function(p){
    var pct=Math.round(p.count/tot*100);
    return '<div class="barrow"><div class="lab"><span>'+(p.lat!=null?'<i class="ti ti-map-pin" style="font-size:11px"></i> ':'')+esc(p.name)+'</span><span class="num" style="color:var(--muted);font-weight:600">'+p.count+' 支 · '+pct+'%</span></div><div class="track"><div class="fill" style="width:'+Math.round(p.count/max*100)+'%"></div></div></div>';
  }).join('');
  if(d.noPlace)html+='<div class="barrow"><div class="lab"><span style="color:var(--muted)">（沒記地點）</span><span class="num" style="color:var(--muted);font-weight:600">'+d.noPlace+' 支</span></div></div>';
  el.innerHTML=html;
}
function renderStatMap(){
  if(typeof L==='undefined'||!$('statMap'))return;
  var pts=((STAT&&STAT.places)||[]).filter(function(p){return p.lat!=null;});
  if(!statMap){
    statMap=L.map('statMap').setView([22.9997,120.2270],13);
    statMap._tile=tileLayerFor(S.settings.mapStyle);statMap._tile.addTo(statMap);
  }else{
    if(statMap._tile)statMap.removeLayer(statMap._tile);
    statMap._tile=tileLayerFor(S.settings.mapStyle);statMap._tile.addTo(statMap);
  }
  if(heatLayer){statMap.removeLayer(heatLayer);heatLayer=null;}
  if(pts.length){
    var max=Math.max.apply(null,pts.map(function(p){return p.count;}))||1;
    heatLayer=L.heatLayer(pts.map(function(p){return [p.lat,p.lng,p.count];}),{radius:35,blur:22,maxZoom:17,max:max}).addTo(statMap);
    try{statMap.fitBounds(L.latLngBounds(pts.map(function(p){return [p.lat,p.lng];})),{padding:[40,40],maxZoom:16});}catch(e){}
  }
  statMap.invalidateSize();
}
function setGran(g){
  statGran=g;
  document.querySelectorAll('#statSeg button').forEach(function(b){b.classList.toggle('active',b.dataset.g===g);});
  var now=new Date(),p=function(n){return n<10?'0'+n:''+n;};
  var today=now.getFullYear()+'-'+p(now.getMonth()+1)+'-'+p(now.getDate());
  var lbl=$('pickerLabel'),slot=$('pickerSlot');
  if(g==='day'){lbl.textContent='日期';if(!statKey||statKey.length!==10)statKey=today;slot.innerHTML='<input type="date" id="statPicker" value="'+statKey+'">';}
  else if(g==='week'){lbl.textContent='週（選週內任一天）';if(!statKey||statKey.length!==10)statKey=today;slot.innerHTML='<input type="date" id="statPicker" value="'+statKey+'">';}
  else if(g==='month'){lbl.textContent='月份';if(!statKey||statKey.length!==7)statKey=now.getFullYear()+'-'+p(now.getMonth()+1);slot.innerHTML='<input type="month" id="statPicker" value="'+statKey+'">';}
  else{lbl.textContent='年份';if(!statKey||statKey.length!==4)statKey=String(now.getFullYear());var ys=[];for(var i=0;i<6;i++)ys.push(now.getFullYear()-i);if(ys.indexOf(+statKey)<0)ys.unshift(+statKey);slot.innerHTML='<select id="statPicker">'+ys.map(function(y){return '<option value="'+y+'"'+(String(y)===statKey?' selected':'')+'>'+y+'</option>';}).join('')+'</select>';}
  $('statPicker').onchange=function(){statKey=$('statPicker').value;doLoadStats();};
  doLoadStats();
}
function doLoadStats(){
  google.script.run.withSuccessHandler(renderStats).withFailureHandler(err).getStats(statGran,statKey);
}
function renderStats(d){
  STAT=d;statKey=d.key;
  $('statRange').textContent=d.rangeLabel||'';
  $('statSum').innerHTML=
    '<div><div class="k">這段期間</div><div class="v num">'+d.total+' 支</div></div>'+
    '<div><div class="k">平均每天</div><div class="v num">'+d.perDay+' 支</div></div>';
  applySecState();
  if(secState.trend)drawTrend(d);
  renderReasonDist(d.reasons);
  renderHourDist(d.hourGroups);
  renderPlaceStats(d);
  if(secState.place)renderStatMap();
}
function drawTrend(d){
  if(typeof Chart==='undefined')return;
  var ctx=$('trendChart').getContext('2d');
  if(trendChart)trendChart.destroy();
  var ds=[{type:'bar',label:'根數',data:d.counts,backgroundColor:'#9fd8cf',borderRadius:4,order:2,maxBarThickness:34}];
  if(d.maWindow>1)ds.push({type:'line',label:d.maWindow+' 期均線',data:d.ma,borderColor:'#0f766e',backgroundColor:'#0f766e',borderWidth:2,pointRadius:0,tension:.35,spanGaps:true,order:1});
  trendChart=new Chart(ctx,{data:{labels:d.labels,datasets:ds},options:{
    responsive:true,maintainAspectRatio:false,animation:false,
    plugins:{legend:{display:d.maWindow>1,labels:{boxWidth:12,font:{size:11},color:'#8a877f'}},tooltip:{}},
    scales:{
      x:{grid:{display:false},ticks:{font:{size:10},color:'#8a877f',maxRotation:0,autoSkip:true,maxTicksLimit:8}},
      y:{beginAtZero:true,ticks:{precision:0,font:{size:10},color:'#8a877f'},grid:{color:'#eee'}}
    }}});
}
function renderReasonDist(arr){
  var el=$('reasonDist');
  if(!arr||!arr.length){el.innerHTML='<div class="empty">這段期間沒有紀錄</div>';return;}
  var max=arr[0].count||1, tot=arr.reduce(function(s,x){return s+x.count;},0);
  el.innerHTML=arr.map(function(r){
    var pct=Math.round(r.count/tot*100);
    return '<div class="barrow"><div class="lab"><span>'+esc(r.name)+'</span><span class="num" style="color:var(--muted);font-weight:600">'+r.count+' 支 · '+pct+'%</span></div>'+
      '<div class="track"><div class="fill" style="width:'+Math.round(r.count/max*100)+'%"></div></div></div>';
  }).join('');
}
function renderHourDist(g){
  var el=$('hourDist');
  var tot=g.reduce(function(s,x){return s+x.v;},0);
  if(!tot){el.innerHTML='<div class="empty">這段期間沒有紀錄</div>';return;}
  var max=Math.max.apply(null,g.map(function(x){return x.v;}))||1;
  el.innerHTML=g.map(function(x){
    return '<div class="barrow"><div class="lab"><span>'+esc(x.k)+'</span><span class="num" style="color:var(--muted);font-weight:600">'+x.v+' 支</span></div>'+
      '<div class="track"><div class="fill" style="width:'+Math.round(x.v/max*100)+'%"></div></div></div>';
  }).join('');
}

/* ---- tabs / sheets ---- */
function showTab(v){
  ['log','stat','inv','set'].forEach(function(k){$('view'+k).classList.toggle('hide',k!==v);});
  document.querySelectorAll('.tabbar button').forEach(function(b){b.classList.toggle('active',b.dataset.v===v);});
  $('saveBtn').parentElement.classList.toggle('hide',v!=='log');
  if(v==='stat')setGran(statGran);
}
function closeSheets(){document.querySelectorAll('.overlay').forEach(function(o){o.classList.remove('show');});}
</script>
