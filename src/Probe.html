<!DOCTYPE html><html lang="zh-Hant"><head>
<base target="_top">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
body{font-family:system-ui,"Noto Sans TC",sans-serif;margin:0;padding:16px;background:#f4f3ef;color:#1c1b18}
h2{font-size:16px;margin:0 0 12px}
button{border:0;background:#0f766e;color:#fff;border-radius:12px;padding:14px 16px;font-size:16px;font-weight:700;width:100%;margin:6px 0;cursor:pointer}
.box{background:#fff;border:1px solid #e7e5de;border-radius:14px;padding:14px;margin-bottom:14px}
pre{white-space:pre-wrap;word-break:break-all;font-size:13px;background:#f4f3ef;padding:10px;border-radius:8px;margin:8px 0 0}
#map{height:300px;border-radius:12px;margin-top:8px;background:#e7e5de}
.ok{color:#2f7d4f;font-weight:700}.bad{color:#c0492f;font-weight:700}
.st{font-size:13px;margin-top:6px}
.basemaps{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.basemaps button{width:auto;flex:1;min-width:calc(50% - 3px);margin:0;padding:10px 8px;font-size:13px;background:#e3efed;color:#0f766e}
.basemaps button.active{background:#0f766e;color:#fff}
</style></head><body>
<h2>🚬 定位 / 地圖 可行性測試</h2>

<div class="box">
  <b>1. 抓目前位置（GPS）</b>
  <button onclick="testGeo()">抓目前位置</button>
  <pre id="geoOut">尚未測試</pre>
</div>

<div class="box">
  <b>2. 地圖樣式（點按鈕切換看哪個順眼）</b>
  <div class="basemaps" id="basemaps"></div>
  <div id="tileSt" class="st">地圖磚：等待中…</div>
  <div id="heatSt" class="st">熱力圖：等待中…</div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
function set(id,cls,txt){var el=document.getElementById(id);el.className='st '+cls;el.textContent=txt;}
function testGeo(){
  var o=document.getElementById('geoOut');
  if(!navigator.geolocation){o.className='bad';o.textContent='這個環境沒有 navigator.geolocation';return;}
  o.className='';o.textContent='請求中…（可能會跳權限詢問，請按允許）';
  navigator.geolocation.getCurrentPosition(function(p){
    o.className='ok';
    o.textContent='✅ 成功\n緯度 '+p.coords.latitude.toFixed(6)+'\n經度 '+p.coords.longitude.toFixed(6)+'\n精度 '+Math.round(p.coords.accuracy)+' m';
  },function(e){
    var m={1:'PERMISSION_DENIED（權限被擋）',2:'POSITION_UNAVAILABLE',3:'TIMEOUT'};
    o.className='bad';
    o.textContent='❌ 失敗 code='+e.code+' '+(m[e.code]||'?')+'\n'+(e.message||'');
  },{enableHighAccuracy:true,timeout:12000,maximumAge:0});
}

var BASEMAPS=[
  {name:'Google 風 (Voyager)',url:'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',sub:'abcd'},
  {name:'乾淨淺色 (Positron)',url:'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',sub:'abcd'},
  {name:'標準 OSM',url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',sub:'abc'},
  {name:'衛星圖 (Esri)',url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',sub:''}
];
var map, curTile;
function switchBase(i){
  if(curTile)map.removeLayer(curTile);
  var b=BASEMAPS[i];
  var opt={maxZoom:19,attribution:''};
  if(b.sub)opt.subdomains=b.sub;
  curTile=L.tileLayer(b.url,opt);
  var got=false;
  curTile.on('load',function(){if(!got){got=true;set('tileSt','ok','✅ 地圖磚 OK：'+b.name);}});
  curTile.on('tileerror',function(){set('tileSt','bad','❌ 地圖磚失敗：'+b.name);});
  curTile.addTo(map);
  var btns=document.querySelectorAll('#basemaps button');
  for(var k=0;k<btns.length;k++)btns[k].className=(k===i?'active':'');
}
window.onload=function(){
  try{
    if(typeof L==='undefined'){set('tileSt','bad','❌ Leaflet 沒載到');return;}
    map=L.map('map').setView([22.9997,120.2270],14);   // 台南成大附近
    var bm=document.getElementById('basemaps');
    BASEMAPS.forEach(function(b,i){var btn=document.createElement('button');btn.textContent=b.name;btn.onclick=function(){switchBase(i);};bm.appendChild(btn);});
    switchBase(0);   // 預設 Google 風
    if(typeof L.heatLayer==='function'){
      L.heatLayer([[22.9997,120.2270,0.9],[23.0010,120.2200,0.6],[22.9950,120.2300,0.7],[23.0100,120.2100,0.4],[22.9997,120.2280,0.8],[22.9985,120.2255,0.7]],{radius:35,blur:22,maxZoom:17}).addTo(map);
      set('heatSt','ok','✅ 熱力圖 OK（地圖上應有紅/黃暈染）');
    }else{ set('heatSt','bad','❌ 熱力圖套件沒載到'); }
  }catch(err){ set('tileSt','bad','❌ 例外：'+err.message); }
};
</script>
</body></html>
